{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <h2>Checkout</h2>

    <div class="row">

        <!-- FORM -->
        <div class="col-md-6">
            <h4>Bilgileriniz</h4>

            <form method="POST">
                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit" class="btn btn-dark mt-3">
                    Siparişi Tamamla
                </button>
            </form>
        </div>

        <!-- CART ÖZET -->
        <div class="col-md-6">
            <h4>Sepet Özeti</h4>

            <ul class="list-group">
                {% for item in cart_items %}
                    <li class="list-group-item d-flex justify-content-between">
                        <div>
                            {{ item.product.name }} ({{ item.quantity }})
                        </div>
                        <span>
                            {{ item.product.price|floatformat:2 }} TL
                        </span>
                    </li>
                {% endfor %}
            </ul>

        </div>

    </div>
</div>
{% endblock %}
